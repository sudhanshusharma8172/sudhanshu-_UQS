services:
  - type: web
    name: student-query-system
    runtime: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt && python download_model.py
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 1 --timeout 120
    envVars:
      - key: GEMINI_API_KEY
        sync: false          # You will paste this manually in the Render dashboard
      - key: PYTHON_VERSION
        value: 3.11.0
